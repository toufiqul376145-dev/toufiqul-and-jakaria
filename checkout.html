 <!DOCTYPE html>
<html>
<head>
<title>Organic Food Checkout</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family: Arial;
    background: #f5f5f5;
    padding: 30px;
}

.box{
    background: white;
    max-width: 500px;
    margin: auto;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h2{
    color: #2e7d32;
    text-align: center;
}

.cart-item{
    border: 1px solid #ddd;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 5px;
}

.input-box{
    width: 100%;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 5px;
    box-sizing: border-box;
}

.method{
    border: 1px solid #ddd;
    margin: 10px 0;
    padding: 10px;
    border-radius: 5px;
}

.order-btn{
    background: #2e7d32;
    color: white;
    border: none;
    padding: 12px;
    width: 100%;
    border-radius: 5px;
    cursor: pointer;
    font-size: 16px;
}

.order-btn:hover{
    background: #1b5e20;
}
</style>
</head>

<body>

<div class="box">

<h2>🌿 Organic Food Checkout</h2>

<h3>Your Cart</h3>

<div id="cartItems"></div>

<p style="font-size:18px;font-weight:bold;">
Total: ৳<span id="totalPrice">0</span>
</p>

<hr>

<h3>Delivery Information</h3>

<input id="name" type="text" class="input-box" placeholder="Your Name"><br><br>
<input id="phone" type="text" class="input-box" placeholder="Phone Number"><br><br>
<textarea id="address" class="input-box" rows="4" placeholder="Enter Your Full Address"></textarea>

<br><br>

<div class="method">bKash (Demo)</div>
<div class="method">Nagad (Demo)</div>
<div class="method">Card (Demo)</div>

<br>

<button class="order-btn" onclick="placeOrder()">
Place Order
</button>

<p><b>Note:</b> Demo website only.</p>

<a href="index.html">← Back</a>

</div>

<script>
// ================= CART LOAD =================
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let cartItemsDiv = document.getElementById("cartItems");
let total = 0;

cart.forEach(item => {
    cartItemsDiv.innerHTML += `
        <div class="cart-item">
            <b>${item.name}</b><br>
            Price: ৳${item.price}
        </div>
    `;
    total += item.price;
});

document.getElementById("totalPrice").innerText = total;
</script>

<!-- ================= FIREBASE ================= -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBz_JBO0uQ0bE_sqdLtupEKHMnlWt-4Nmw",
  authDomain: "organic-food-market-da267.firebaseapp.com",
  projectId: "organic-food-market-da267",
  storageBucket: "organic-food-market-da267.firebasestorage.app",
  messagingSenderId: "1074047510883",
  appId: "1:1074047510883:web:92ae862f008c5ed0ea0b56"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ⭐ ONLY ONE placeOrder FUNCTION (IMPORTANT)
window.placeOrder = async function(){

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    let name = document.getElementById("name").value.trim();
    let phone = document.getElementById("phone").value.trim();
    let address = document.getElementById("address").value.trim();

    if(cart.length === 0){
        alert("❌ Cart is empty!");
        return;
    }

    if(!name || !phone || !address){
        alert("❌ Fill all fields!");
        return;
    }

    let total = 0;
    cart.forEach(item => total += item.price);

    try {
        await addDoc(collection(db, "orders"), {
            name,
            phone,
            address,
            cart,
            total,
            status: "Pending",
            createdAt: new Date().toISOString()
        });

        localStorage.removeItem("cart");

        alert("✅ Order placed successfully!");

        window.location.href = "index.html";

    } catch (error) {
        alert("❌ Error placing order: " + error.message);
    }
};

</script>

</body>
</html>
