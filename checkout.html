<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.box{
background:white;
max-width:700px;
margin:auto;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.item{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #ddd;
}

.total{
font-size:24px;
font-weight:bold;
color:#2e7d32;
margin-top:20px;
}

.btn{
background:#2e7d32;
color:white;
padding:12px;
border:none;
width:100%;
border-radius:5px;
cursor:pointer;
margin-top:15px;
}
</style>

</head>
<body>

<div class="box">

<h2>🌿 Organic Food Checkout</h2>

<div id="list"></div>

<div class="total">
Total: ৳<span id="total">0</span>
</div>

<h3>Payment Method</h3>

<p>📱 bKash</p>
<p>📱 Nagad</p>
<p>💳 Card</p>

<button class="btn" onclick="placeOrder()">
Place Order
</button>

<br><br>

<a href="index.html">← Back To Shop</a>

</div>

<script>

let cart=JSON.parse(localStorage.getItem("cart")) || [];

let total=0;

let list=document.getElementById("list");

cart.forEach(item=>{

total+=item.price;

list.innerHTML+=`
<div class="item">
<span>${item.name}</span>
<span>৳${item.price}</span>
</div>
`;

});

document.getElementById("total").innerText=total;

function placeOrder(){

if(cart.length===0){
alert("Cart is empty!");
return;
}

alert("Order placed successfully!");

localStorage.removeItem("cart");

window.location.href="success.html";

}
</script>

</body>
</html>
