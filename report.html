<!DOCTYPE html>
<html>
<head>
<title>Report Problem</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family: Arial;
    background:#f5f5f5;
    padding:20px;
}

.box{
    max-width:400px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    color:#d32f2f;
}

input, textarea{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:10px;
    background:#d32f2f;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#b71c1c;
}
</style>
</head>

<body>

<div class="box">

<h2>🚨 Report Issue</h2>

<input id="name" placeholder="Your Name">
<input id="problem" placeholder="Problem Type">
<textarea id="message" placeholder="Describe issue"></textarea>

<button onclick="sendReport()">Send Report</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBz_JBO0uQ0bE_sqdLtupEKHMnlWt-4Nmw",
  authDomain: "organic-food-market-da267.firebaseapp.com",
  projectId: "organic-food-market-da267"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.sendReport = async function(){

    let name = document.getElementById("name").value.trim();
    let problem = document.getElementById("problem").value.trim();
    let message = document.getElementById("message").value.trim();

    if(!name || !problem || !message){
        alert("❌ Please fill all fields!");
        return;
    }

    let btn = document.querySelector("button");
    btn.innerText = "Sending...";
    btn.disabled = true;

    await addDoc(collection(db,"reports"),{
        name,
        problem,
        message,
        createdAt: new Date().toISOString()
    });

    alert("🚨 Report sent successfully!");

    window.location.href = "index.html";
};

</script>

</body>
</html>
