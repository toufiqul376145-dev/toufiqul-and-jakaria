<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family: Arial;
    background:#f4f4f4;
    margin:0;
    padding:20px;
}

.header{
    background:#2e7d32;
    color:white;
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

.tabs{
    display:flex;
    gap:10px;
    margin:15px 0;
    flex-wrap:wrap;
}

.tab-btn{
    padding:10px 15px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    background:#ddd;
}

.tab-btn.active{
    background:#2e7d32;
    color:white;
}

.card{
    background:white;
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.small{
    font-size:14px;
    color:#555;
}
</style>
</head>

<body>

<div class="header">🛒 Admin Dashboard</div>

<div class="tabs">
<button class="tab-btn active" onclick="showTab('orders')">Orders</button>
<button class="tab-btn" onclick="showTab('contacts')">Contact Us</button>
<button class="tab-btn" onclick="showTab('reports')">Reports</button>
</div>

<div id="content"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBz_JBO0uQ0bE_sqdLtupEKHMnlWt-4Nmw",
  authDomain: "organic-food-market-da267.firebaseapp.com",
  projectId: "organic-food-market-da267",
  storageBucket: "organic-food-market-da267.firebasestorage.app",
  messagingSenderId: "1074047510883",
  appId: "1:1074047510883:web:92ae862f008c5ed0ea0b56"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentTab = "orders";

window.showTab = async function(tab){
    currentTab = tab;

    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
    event.target.classList.add("active");

    if(tab === "orders") loadOrders();
    if(tab === "contacts") loadContacts();
    if(tab === "reports") loadReports();
}

// ---------------- ORDERS ----------------
async function loadOrders(){
    let snap = await getDocs(collection(db,"orders"));
    let html = "<h2>📦 Orders</h2>";

    snap.forEach(d=>{
        let o = d.data();
        html += `
        <div class="card">
            <b>${o.name}</b><br>
            📞 ${o.phone}<br>
            🏠 ${o.address}<br>
            💰 ৳${o.total}<br>
            Status: ${o.status}
        </div>`;
    });

    document.getElementById("content").innerHTML = html;
}

// ---------------- CONTACT ----------------
async function loadContacts(){
    let snap = await getDocs(collection(db,"contacts"));
    let html = "<h2>📩 Contact Messages</h2>";

    snap.forEach(d=>{
        let c = d.data();
        html += `
        <div class="card">
            <b>${c.name}</b><br>
            📞 ${c.phone}<br>
            💬 ${c.message}
        </div>`;
    });

    document.getElementById("content").innerHTML = html;
}

// ---------------- REPORTS ----------------
async function loadReports(){
    let snap = await getDocs(collection(db,"reports"));
    let html = "<h2>🚨 Reports</h2>";

    snap.forEach(d=>{
        let r = d.data();
        html += `
        <div class="card">
            <b>${r.name}</b><br>
            ⚠️ ${r.problem}<br>
            💬 ${r.message}
        </div>`;
    });

    document.getElementById("content").innerHTML = html;
}

// default load
loadOrders();

</script>

</body>
</html>
